<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Move — 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --surface3: #232330;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --text: #ffffff;
  --text2: rgba(255,255,255,0.55);
  --text3: rgba(255,255,255,0.3);
  --blue: #4f6ef7;
  --blue2: #6b84ff;
  --green: #26c76e;
  --green2: #34e882;
  --purple: #a855f7;
  --orange: #f97316;
  --pink: #ec4899;
  --teal: #14b8a6;
  --yellow: #eab308;
  --r: 16px;
  --r-sm: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  font-family: 'Manrope', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 90px;
  -webkit-font-smoothing: antialiased;
}

/* FADE IN */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade { animation: fadeUp 0.45s cubic-bezier(0.16,1,0.3,1) both; }
.fade-1 { animation-delay: 0.05s; }
.fade-2 { animation-delay: 0.12s; }
.fade-3 { animation-delay: 0.19s; }
.fade-4 { animation-delay: 0.26s; }
.fade-5 { animation-delay: 0.33s; }

/* HEADER */
.header {
  padding: 56px 20px 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.header-greeting { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 2px; }
.header-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.header-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}

/* HERO CARD */
.hero {
  margin: 20px 16px 0;
  background: linear-gradient(145deg, #1a1f3e 0%, #0f1220 60%, #16101e 100%);
  border-radius: 24px;
  border: 1px solid rgba(79,110,247,0.2);
  padding: 24px 22px 20px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(79,110,247,0.18) 0%, transparent 70%);
  pointer-events: none;
}
.hero::after {
  content: '';
  position: absolute;
  bottom: -60px; left: -40px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(168,85,247,0.1) 0%, transparent 70%);
  pointer-events: none;
}
.hero-row { display: flex; justify-content: space-between; align-items: flex-start; position: relative; }
.hero-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: rgba(255,255,255,0.45); text-transform: uppercase; margin-bottom: 6px; }
.hero-number { font-size: 64px; font-weight: 800; letter-spacing: -3px; line-height: 1; }
.hero-unit { font-size: 16px; font-weight: 500; color: var(--text2); margin-top: 4px; letter-spacing: -0.2px; }
.hero-divider { width: 1px; background: rgba(255,255,255,0.08); margin: 0 18px; align-self: stretch; }
.hero-stat { }
.hero-stat-num { font-size: 40px; font-weight: 800; letter-spacing: -2px; line-height: 1; color: var(--green2); }
.hero-stat-unit { font-size: 13px; font-weight: 500; color: var(--text2); margin-top: 4px; }

/* YEAR PROGRESS */
.progress-block {
  margin-top: 18px;
  position: relative;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.progress-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; }
.progress-fraction { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.55); font-variant-numeric: tabular-nums; }
.progress-track {
  width: 100%;
  height: 5px;
  background: rgba(255,255,255,0.08);
  border-radius: 100px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 100px;
  background: linear-gradient(90deg, var(--blue), var(--blue2));
  transition: width 1s cubic-bezier(0.16,1,0.3,1);
}
.progress-active-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--blue2);
  box-shadow: 0 0 6px var(--blue);
  display: inline-block;
  margin-right: 5px;
  vertical-align: middle;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; box-shadow: 0 0 6px var(--blue); }
  50% { opacity: 0.6; box-shadow: 0 0 12px var(--blue); }
}

/* SECTION */
.section { margin: 24px 16px 0; }
.section-label {
  font-size: 13px; font-weight: 700; color: var(--text2);
  margin-bottom: 12px; letter-spacing: -0.1px;
}

/* CATEGORY CARDS */
.cats { display: flex; flex-direction: column; gap: 8px; }
.cat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  position: relative;
  overflow: hidden;
}
.cat:active { background: var(--surface2); }
.cat-icon-wrap {
  width: 44px; height: 44px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  background: var(--cat-bg, rgba(255,255,255,0.06));
}
.cat-body { flex: 1; min-width: 0; }
.cat-name { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
.cat-stickers { font-size: 13px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
.cat-right { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.cat-count { font-size: 26px; font-weight: 800; letter-spacing: -1px; line-height: 1; color: var(--cat-color, var(--text)); }
.cat-btns { display: flex; gap: 6px; align-items: center; }
.cat-add, .cat-rem {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: transparent;
  font-size: 18px; font-family: inherit;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
  line-height: 1;
}
.cat-add { color: var(--text2); }
.cat-rem { color: var(--text3); font-size: 20px; }
.cat-add:active { background: var(--cat-color, var(--blue)); border-color: transparent; color: #fff; }
.cat-rem:active { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #ef4444; }
.cat-rem:disabled { opacity: 0.2; cursor: default; }



/* STATS SHEET */
.stats-overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  align-items: flex-end;
}
.stats-overlay.open { display: flex; }
.stats-sheet {
  background: var(--surface);
  border-radius: 28px 28px 0 0;
  border: 1px solid var(--border2);
  border-bottom: none;
  width: 100%; max-width: 480px;
  margin: 0 auto;
  max-height: 82vh;
  overflow-y: auto;
  padding: 0 0 max(32px, env(safe-area-inset-bottom));
  animation: sheetUp 0.36s cubic-bezier(0.16,1,0.3,1);
}
.stats-sheet-head { padding: 16px 22px 0; position: sticky; top: 0; background: var(--surface); z-index: 2; border-bottom: 1px solid var(--border); padding-bottom: 14px; }
.stats-sheet-drag { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.stats-sheet-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.stats-sheet-sub { font-size: 13px; color: var(--text2); margin-top: 3px; font-weight: 500; }
.stats-body { padding: 16px 22px 0; }
.month-block { margin-bottom: 20px; }
.month-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
.month-name { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
.month-meta { font-size: 12px; color: var(--text2); font-weight: 600; }
.month-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.month-bar-label { font-size: 11px; font-weight: 600; color: var(--text2); width: 72px; flex-shrink: 0; text-align: right; }
.month-bar-track { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 100px; overflow: hidden; }
.month-bar-fill { height: 100%; border-radius: 100px; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }
.month-bar-val { font-size: 12px; font-weight: 700; color: var(--text); width: 24px; text-align: right; flex-shrink: 0; }
.month-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.month-chip {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 100px; padding: 4px 10px 4px 7px;
  font-size: 11px; font-weight: 600; color: var(--text2);
}
.month-chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.month-divider { height: 1px; background: var(--border); margin-bottom: 20px; }
.month-days-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.month-days-label { font-size: 11px; color: var(--text3); font-weight: 600; }
.month-dots { display: flex; gap: 3px; flex-wrap: wrap; }
.month-dot { width: 8px; height: 8px; border-radius: 50%; }
.month-dot.active { background: var(--green2); }
.month-dot.rest { background: rgba(255,255,255,0.08); }

/* FREQUENCY ROW */
.freq-row {
  display: flex; align-items: center;
  margin-top: 16px;
  background: rgba(255,255,255,0.04);
  border-radius: 14px;
  padding: 12px 16px;
  gap: 0;
}
.freq-item { flex: 1; text-align: center; }
.freq-num { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
.freq-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
.freq-sep { width: 1px; background: rgba(255,255,255,0.08); align-self: stretch; margin: 0 4px; }

/* SWIPE TO DELETE on activity rows */
.act-wrap { position: relative; overflow: hidden; }
.act-delete-bg {
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 80px; background: #ef4444;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #fff; font-weight: 700;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.act-wrap:last-child .act-delete-bg { border-bottom: none; }
.act-wrap.extra-only .act-delete-bg { display: flex; }
.act { position: relative; transition: transform 0.2s; touch-action: pan-y; }
.act.swiped { transform: translateX(-80px); }
.act.base-row .act { cursor: default; }

/* STICKER EXPAND */
.sticker-panel {
  display: none;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  margin: 10px -16px -14px;
  padding: 12px 16px 14px;
  font-size: 22px;
  line-height: 1.7;
  letter-spacing: 2px;
  word-break: break-all;
}
.sticker-panel.open { display: block; }
.sticker-panel-hint { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }

/* RECENT */
.recent-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}
.act {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.act:last-child { border-bottom: none; }
.act:active { background: var(--surface2); }
.act-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--surface3);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.act-body { flex: 1; min-width: 0; }
.act-title { font-size: 14px; font-weight: 600; letter-spacing: -0.1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.act-date { font-size: 11px; color: var(--text2); margin-top: 1px; font-weight: 500; }
.act-right { text-align: right; flex-shrink: 0; }
.act-time { font-size: 12px; font-weight: 600; color: var(--text2); font-variant-numeric: tabular-nums; }
.act-cal { font-size: 11px; color: var(--text3); margin-top: 1px; }
.show-more {
  text-align: center; padding: 14px;
  border-top: 1px solid var(--border);
}
.show-more button {
  font-size: 13px; font-weight: 600; color: var(--blue2);
  background: none; border: none; cursor: pointer;
  font-family: 'Manrope', sans-serif; letter-spacing: -0.1px;
}

/* BOTTOM NAV */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; align-items: flex-end;
  padding: 10px 0 max(12px, env(safe-area-inset-bottom));
  z-index: 50;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: none; border: none; color: var(--text3);
  font-family: 'Manrope', sans-serif; font-size: 10px; font-weight: 600;
  letter-spacing: 0.02em; text-transform: uppercase;
  cursor: pointer; padding: 2px 0; transition: color 0.15s;
}
.nav-btn.active { color: var(--text); }
.nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.nav-log {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: none; border: none; cursor: pointer; padding: 0;
  font-family: 'Manrope', sans-serif;
}
.nav-log-pill {
  width: 52px; height: 52px; border-radius: 16px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  display: flex; align-items: center; justify-content: center;
  margin-top: -20px;
  box-shadow: 0 4px 20px rgba(79,110,247,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
}
.nav-log:active .nav-log-pill { transform: scale(0.92); box-shadow: 0 2px 10px rgba(79,110,247,0.3); }
.nav-log-pill svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; }
.nav-log-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.02em; }

/* MODAL */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  align-items: flex-end;
}
.overlay.open { display: flex; }
.sheet {
  background: var(--surface);
  border-radius: 28px 28px 0 0;
  border: 1px solid var(--border2);
  border-bottom: none;
  width: 100%; max-width: 480px;
  margin: 0 auto;
  max-height: 92vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 0 max(32px, env(safe-area-inset-bottom));
  animation: sheetUp 0.36s cubic-bezier(0.16,1,0.3,1);
}
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-drag { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 0; }
.sheet-head { padding: 20px 22px 0; }
.sheet-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.sheet-sub { font-size: 13px; color: var(--text2); margin-top: 4px; font-weight: 500; }
.sheet-body { padding: 14px 22px 0; }
.field-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--text2); text-transform: uppercase; margin-bottom: 10px; display: block; }
.field-group { margin-bottom: 14px; }
.type-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.type-opt {
  background: var(--surface2); border: 1.5px solid transparent;
  border-radius: var(--r-sm); padding: 11px 4px; text-align: center;
  cursor: pointer; transition: all 0.15s; -webkit-user-select: none; user-select: none;
}
.type-opt:active { background: var(--surface3); }
.type-opt.sel { border-color: var(--blue); background: rgba(79,110,247,0.1); }
.type-emoji { font-size: 24px; display: block; margin-bottom: 4px; }
.type-name { font-size: 10px; color: var(--text2); font-weight: 600; letter-spacing: 0.02em; }
.type-opt.sel .type-name { color: var(--blue2); }
.sh-input {
  width: 100%;
  background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: var(--r-sm); padding: 13px 14px;
  color: var(--text); font-size: 15px; font-weight: 500;
  font-family: 'Manrope', sans-serif; outline: none;
  -webkit-appearance: none; appearance: none;
  transition: border-color 0.15s;
}
.sh-input:focus { border-color: var(--blue); }
.sh-input::placeholder { color: var(--text3); }
.save-btn {
  width: 100%; padding: 16px; border-radius: 14px;
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  color: #fff; font-family: 'Manrope', sans-serif;
  font-size: 15px; font-weight: 800; letter-spacing: -0.2px;
  border: none; cursor: pointer; margin-top: 4px;
  box-shadow: 0 4px 20px rgba(79,110,247,0.35);
  transition: transform 0.12s, box-shadow 0.12s;
}
.save-btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(79,110,247,0.2); }

/* TOAST */
.toast {
  position: fixed; bottom: 86px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface3); border: 1px solid var(--border2);
  color: var(--text); padding: 10px 20px; border-radius: 100px;
  font-size: 13px; font-weight: 600;
  opacity: 0; transition: all 0.28s; z-index: 200;
  white-space: nowrap; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header fade fade-1">
  <div>
    <div class="header-greeting" id="greeting">Good morning</div>
    <div class="header-title">Your 2026 moves</div>
  </div>
  <div class="header-avatar">🏃</div>
</div>

<!-- HERO CARD -->
<div class="hero fade fade-2">
  <div class="hero-row">
    <div>
      <div class="hero-label">Total workouts</div>
      <div class="hero-number" id="hero-total">82</div>
      <div class="hero-unit">activities logged</div>
    </div>
    <div class="hero-divider"></div>
    <div class="hero-stat">
      <div class="hero-label">Days moved</div>
      <div class="hero-stat-num" id="hero-days">62</div>
      <div class="hero-stat-unit">unique days</div>
    </div>
  </div>

  <div class="progress-block">
    <div class="progress-meta">
      <div class="progress-label">
        <span class="progress-active-dot"></span>Day <span id="day-num">155</span> of 365
      </div>
      <div class="progress-fraction" id="progress-pct">42.5%</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
  </div>

  <div class="freq-row">
    <div class="freq-item">
      <div class="freq-num" id="freq-pct">—</div>
      <div class="freq-label">of days moved</div>
    </div>
    <div class="freq-sep"></div>
    <div class="freq-item">
      <div class="freq-num" id="freq-week">—</div>
      <div class="freq-label">per week avg</div>
    </div>
    <div class="freq-sep"></div>
    <div class="freq-item">
      <div class="freq-num" id="freq-rest">—</div>
      <div class="freq-label">rest days</div>
    </div>
  </div>
</div>

<!-- CATEGORIES -->
<div class="section fade fade-3">
  <div class="section-label">By activity</div>
  <div class="cats" id="cats"></div>
</div>

<!-- RECENT -->
<div class="section fade fade-4">
  <div class="section-label">Recent</div>
  <div class="recent-card">
    <div id="act-list"></div>
    <div class="show-more"><button id="show-more-btn" onclick="toggleAll()">Show all →</button></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-home" onclick="switchTab('home')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    Home
  </button>

    <div class="nav-log-pill">

const SK = "move26_rv1";
let extra = [];
let storageReady = false;

async function loadStorage() {
  try {
    const result = await window.storage.get(SK);
    if (result && result.value) extra = JSON.parse(result.value);
  } catch(e) { extra = []; }
  storageReady = true;
  activities = buildActivities();
  render();
}

function buildActivities() {
  const tagged = extra.map((a, i) => ({ ...a, _extra: true, _extraIdx: i }));
  return [...BASE, ...tagged].sort((a, b) => b.date.localeCompare(a.date));
}
let activities = buildActivities();
let showAll = false;
let selectedType = "Treadmill Running";
let expandedCat = null;

function counts() {
  const c = {}; Object.keys(CATS).forEach(k => c[k] = 0);
  activities.forEach(a => { if(c[a.type] !== undefined) c[a.type]++; });
  return c;
}

function uniqueDays() {
  return new Set(activities.map(a => a.date)).size;
}

function dayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

function getStickers(type, count) {
  const pool = CATS[type]?.stickers || ["🏋️"];
  return Array.from({length: count}, (_, i) => pool[i % pool.length]).join(" ");
}

function fmtDate(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("en-ZA", {day:"numeric", month:"short"});
}

function setGreeting() {
  const h = new Date().getHours();
  const g = h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
  document.getElementById("greeting").textContent = g;
}

function render() {
  setGreeting();
  const ct = counts();
  const total = activities.length;
  const days = uniqueDays();
  const doy = dayOfYear();
  const pct = ((doy / 365) * 100).toFixed(1);

  document.getElementById("hero-total").textContent = total;
  document.getElementById("hero-days").textContent = days;
  document.getElementById("day-num").textContent = doy;
  document.getElementById("progress-pct").textContent = pct + "%";

  // Frequency stats
  const freqPct = Math.round((days / doy) * 100);
  const weeksElapsed = doy / 7;
  const perWeek = (days / weeksElapsed).toFixed(1);
  const restDays = doy - days;
  document.getElementById("freq-pct").textContent = freqPct + "%";
  document.getElementById("freq-week").textContent = perWeek + "×";
  document.getElementById("freq-rest").textContent = restDays;
  setTimeout(() => {
    document.getElementById("progress-fill").style.width = pct + "%";
  }, 200);

  // Categories
  const catsEl = document.getElementById("cats");
  catsEl.innerHTML = "";
  Object.entries(CATS).forEach(([key, cat]) => {
    const n = ct[key] || 0;
    const isExp = expandedCat === key;
    const wrap = document.createElement("div");
    wrap.innerHTML = `
      <div class="cat" data-key="${key}" style="--cat-color:${cat.color}; --cat-bg:${cat.bg};">
        <div class="cat-icon-wrap" style="background:${cat.bg};">${cat.emoji}</div>
        <div class="cat-body">
          <div class="cat-name">${cat.label}</div>
          <div class="cat-stickers">${n > 0 ? getStickers(key, Math.min(n, 14)) : "—"}</div>
        </div>
        <div class="cat-right">
          <div class="cat-count" style="color:${cat.color};">${n}</div>
          <div class="cat-btns">
            <button class="cat-rem" onclick="event.stopPropagation();quickRemove('${key}')" aria-label="Remove ${cat.label}" ${n===0?'disabled':''}>−</button>
            <button class="cat-add" onclick="event.stopPropagation();quickAdd('${key}')" aria-label="Quick add ${cat.label}">+</button>
          </div>
        </div>
        ${isExp && n > 0 ? `<div class="sticker-panel open"><div class="sticker-panel-hint">All ${n} stickers</div>${getStickers(key, n)}</div>` : ''}
      </div>`;
    const catEl = wrap.querySelector(".cat");
    catEl.onclick = () => { expandedCat = isExp ? null : key; render(); };
    catsEl.appendChild(catEl);
  });

  // Recent list
  const listEl = document.getElementById("act-list");
  const shown = showAll ? activities : activities.slice(0, 8);
  listEl.innerHTML = shown.map((a, i) => {
    const cat = CATS[a.type] || { emoji: "🏋️" };
    const isExtra = a._extra === true;
    const idx = a._extraIdx;
    return `<div class="act-wrap">
      <div class="act">
        <div class="act-icon">${cat.emoji}</div>
        <div class="act-body">
          <div class="act-title">${a.title}</div>
          <div class="act-date">${fmtDate(a.date)}${isExtra ? ' · <span style="color:var(--blue2);font-size:10px;font-weight:700">ADDED</span>' : ''}</div>
        </div>
        <div class="act-right">
          <div class="act-time">${a.time && a.time !== "--" ? a.time : ""}</div>
          <div class="act-cal">${a.calories && a.calories !== "--" ? a.calories + " kcal" : ""}</div>
          ${isExtra ? `<button onclick="editExtra(${idx})" style="background:none;border:none;color:var(--blue2);font-size:11px;cursor:pointer;font-family:inherit;padding:0;margin-top:3px;font-weight:700;letter-spacing:0.02em;">✏️ Edit</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join("");

  document.getElementById("show-more-btn").textContent =
    showAll ? "Show less" : `Show all ${total} →`;
}

function toggleAll() { showAll = !showAll; render(); }

let editingIdx = null;

function openModal(type) {
  editingIdx = null;
  selectedType = type || "Treadmill Running";
  document.getElementById("new-date").value = new Date().toISOString().split("T")[0];
  document.getElementById("new-time").value = "";
  document.getElementById("new-calories").value = "";
  document.getElementById("new-notes").value = "";
  document.getElementById("sheet-title").textContent = "Log workout";
  document.getElementById("sheet-sub").textContent = "Add to your 2026 streak";
  document.getElementById("save-btn").textContent = "Add workout";
  buildTypeGrid();
  document.getElementById("overlay").classList.add("open");
}

function editExtra(idx) {
  editingIdx = idx;
  const a = extra[idx];
  selectedType = a.type;
  document.getElementById("new-date").value = a.date;
  document.getElementById("new-time").value = a.time !== "--" ? a.time : "";
  document.getElementById("new-calories").value = a.calories !== "--" ? a.calories : "";
  document.getElementById("new-notes").value = a.title !== a.type ? a.title : "";
  document.getElementById("sheet-title").textContent = "Edit workout";
  document.getElementById("sheet-sub").textContent = "Update your entry";
  document.getElementById("save-btn").textContent = "Save changes";
  buildTypeGrid();
  document.getElementById("overlay").classList.add("open");
}
function closeModal() { document.getElementById("overlay").classList.remove("open"); }
function maybeClose(e) { if (e.target === document.getElementById("overlay")) closeModal(); }

function buildTypeGrid() {
  document.getElementById("type-grid").innerHTML = Object.entries(CATS).map(([k, c]) =>
    `<div class="type-opt${k === selectedType ? " sel" : ""}" onclick="selectType('${k}')">
      <span class="type-emoji">${c.emoji}</span>
      <span class="type-name">${c.label}</span>
    </div>`
  ).join("");
}
function selectType(t) { selectedType = t; buildTypeGrid(); }

function quickAdd(type) {
  openModal(type);
}

function quickRemove(type) {
  // Remove the most recently added extra entry of this type
  for (let i = extra.length - 1; i >= 0; i--) {
    if (extra[i].type === type) {
      extra.splice(i, 1);
      window.storage.set(SK, JSON.stringify(extra)).catch(()=>{});
      activities = buildActivities();
      render();
      showToast("Removed 1 " + type + " entry");
      return;
    }
  }
  showToast("No manually added entries for this type");
}

function removeExtra(idx) {
  extra.splice(idx, 1);
  window.storage.set(SK, JSON.stringify(extra)).catch(()=>{});
  activities = buildActivities();
  render();
  showToast("Entry removed");
}

function saveActivity() {
  const date = document.getElementById("new-date").value;
  const notes = document.getElementById("new-notes").value;
  const time = document.getElementById("new-time").value.trim() || "--";
  const calories = document.getElementById("new-calories").value.trim() || "--";
  if (!date) return;
  const entry = { type: selectedType, date, title: notes || selectedType, distance: "--", calories, time };
  if (editingIdx !== null) {
    extra[editingIdx] = entry;
    showToast("✅ Entry updated!");
  } else {
    extra.push(entry);
    showToast(CATS[selectedType].emoji + "  Added!");
  }
  window.storage.set(SK, JSON.stringify(extra)).catch(()=>{});
  activities = buildActivities();
  closeModal();
  render();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}


const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONTH_DAYS = [31,28,31,30,31,30,31,31,30,31,30,31];
const CAT_COLORS = {
  "Treadmill Running":"#6b84ff","Yoga":"#a855f7","Walking":"#14b8a6",
  "Cardio":"#f97316","Running":"#34e882","HIIT":"#eab308","Elliptical":"#ec4899"
};

function switchTab(tab) {
  document.getElementById('nav-home').classList.toggle('active', tab==='home');
  document.getElementById('nav-stats').classList.toggle('active', tab==='stats');
  if (tab === 'stats') openStats();
}

function openStats() {
  renderStats();
  document.getElementById('stats-overlay').classList.add('open');
}
function closeStats() { document.getElementById('stats-overlay').classList.remove('open'); }
function maybeCloseStats(e) { if(e.target===document.getElementById('stats-overlay')) { closeStats(); switchTab('home'); } }

function renderStats() {
  const body = document.getElementById('stats-body');
  const now = new Date();
  const currentMonth = now.getMonth(); // 0-indexed
  // max activities in any month for bar scaling
  const monthlyCounts = [];
  for (let m = 0; m <= currentMonth; m++) {
    const mActs = activities.filter(a => new Date(a.date+'T12:00:00').getMonth() === m);
    const mDays = new Set(mActs.map(a => a.date)).size;
    const byType = {};
    mActs.forEach(a => { byType[a.type] = (byType[a.type]||0)+1; });
    const daysInMonth = m === currentMonth ? now.getDate() : MONTH_DAYS[m];
    monthlyCounts.push({ m, total: mActs.length, days: mDays, byType, daysInMonth, acts: mActs });
  }
  const maxTotal = Math.max(...monthlyCounts.map(x => x.total), 1);
  const maxDays = Math.max(...monthlyCounts.map(x => x.days), 1);

  body.innerHTML = monthlyCounts.reverse().map(({ m, total, days, byType, daysInMonth, acts }) => {
    const barPct = Math.round((total / maxTotal) * 100);
    const daysPct = Math.round((days / maxDays) * 100);
    const restDays = daysInMonth - days;
    const dots = Array.from({length: daysInMonth}, (_,i) => {
      const d = i+1;
      const dateStr = `2026-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const active = acts.some(a => a.date === dateStr);
      return `<div class="month-dot ${active?'active':'rest'}" title="${dateStr}"></div>`;
    }).join('');
    const chips = Object.entries(byType).sort((a,b)=>b[1]-a[1]).map(([type, n]) =>
      `<div class="month-chip">
        <div class="month-chip-dot" style="background:${CAT_COLORS[type]||'#888'}"></div>
        ${n} ${type}
      </div>`
    ).join('');
    return `
      <div class="month-block">
        <div class="month-header">
          <div class="month-name">${MONTH_NAMES[m]}</div>
          <div class="month-meta">${days} active · ${restDays} rest</div>
        </div>
        <div class="month-bar-row">
          <div class="month-bar-label">Workouts</div>
          <div class="month-bar-track"><div class="month-bar-fill" style="width:${barPct}%;background:var(--blue2)"></div></div>
          <div class="month-bar-val">${total}</div>
        </div>
        <div class="month-bar-row">
          <div class="month-bar-label">Active days</div>
          <div class="month-bar-track"><div class="month-bar-fill" style="width:${daysPct}%;background:var(--green2)"></div></div>
          <div class="month-bar-val">${days}</div>
        </div>
        <div class="month-chips">${chips}</div>
        <div class="month-days-row">
          <div class="month-days-label">Daily view</div>
          <div class="month-dots">${dots}</div>
        </div>
      </div>
      <div class="month-divider"></div>`;
  }).join('');
}

// init
if (typeof window.storage !== 'undefined') {
  loadStorage();
} else {
  // fallback to localStorage if not in artifact environment
  try { const s = localStorage.getItem(SK); if(s) extra = JSON.parse(s); } catch(e){}
  activities = buildActivities();
  render();
}
</script>
</body>
</html>
